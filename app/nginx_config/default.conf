server {
    listen 80;
    server_name localhost;

    # Define max upload size
    client_max_body_size 10M;

    # The absolute path to your production web root inside the container
    root /var/www/html; 
    index index.php index.html;

    # 1. Global Virtual Routing Engine
    # Intercepts standard clean URLs and forwards them to the front-controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 2. PHP-FPM FastCGI Process Manager Lifecycle Block
    # Handles execution for legitimate and dynamic PHP requests
    location ~ \.php$ {
        # CRITICAL FIX: If the requested physical .php file does not exist on disk,
        # fallback directly to index.php instead of throwing Nginx's raw, ugly 404 block.
        try_files $uri /index.php?$query_string;
        
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # Targets the backend PHP service defined in your docker-compose ecosystem
        fastcgi_pass app:9000; 
        fastcgi_index index.php;
        include fastcgi_params;
        
        # Standard FastCGI path variable bindings
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # REVERSE PROXY SSL ALIGNMENT
        # Forwards the host's edge proxy encryption state to the PHP container
        fastcgi_param HTTPS $http_x_forwarded_proto;
    }
}
