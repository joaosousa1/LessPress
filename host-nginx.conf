server {
    listen 80;
    server_name o-teu-dominio.com; # Substitui pelo teu domínio

    # Pasta no HOST onde está o teu ficheiro manutencao.html
    root /var/www/manutencao-host; 
    index index.html;

    location / {
        # Passa o tráfego para o Docker na porta 8081
        proxy_pass http://127.0.0.1:8081;
        
        # Headers essenciais para o PHP dentro do Docker saber o IP real do cliente
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SE O DOCKER ESTIVER EM BAIXO, o Nginx vai gerar um erro 502. 
        # Esta linha diz para o Nginx NÃO mostrar o erro padrão dele.
        proxy_intercept_errors on;
    }

    # Ativa o redirecionamento caso o Docker falhe (Erros 502, 503 ou 504)
    error_page 502 503 504 = @manutencao;

    # O "bloco condicional" que vai servir a página de manutenção do Host
    location @manutencao {
        # Força o browser a receber um código 503 (Serviço Indisponível) 
        # Isto é crucial para o Google saber que é temporário e não desindexar o site!
        return 503;
    }

    # Define o que mostrar quando o erro 503 é ativado
    error_page 503 /manutencao.html;
    location = /manutencao.html {
        # O Nginx vai procurar o ficheiro manutencao.html dentro de /var/www/manutencao-host/
        internal;
    }
}
